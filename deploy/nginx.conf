# ─── TFC Production Nginx Config ───────────────────────────────────────────────
# Domain: tfc-event.com
# Frontend: React SPA (Vite build) served as static files
# Backend: Node.js/Express on port 3001 (reverse proxy)
# SSL: Let's Encrypt via Certbot
# ──────────────────────────────────────────────────────────────────────────────

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=webhooks:10m rate=30r/s;

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name tfc-event.com www.tfc-event.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tfc-event.com www.tfc-event.com;

    # ── SSL (managed by Certbot — paths auto-generated) ──────────────────────
    ssl_certificate     /etc/letsencrypt/live/tfc-event.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tfc-event.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security Headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Gzip Compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff2;

    # ── Static Frontend (React build) ────────────────────────────────────────
    root /var/www/tfc/dist;
    index index.html;

    # Cache static assets aggressively (Vite hashes filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Cache images/fonts
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ── API Reverse Proxy → Express (port 3001) ─────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Increase body size for file uploads (champion photos)
        client_max_body_size 10M;
    }

    # ── Webhook endpoints (higher rate limit) ────────────────────────────────
    location /api/webhooks/ {
        limit_req zone=webhooks burst=50 nodelay;

        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        # Important: preserve raw body for Stripe/NOWPayments signature verification
        client_max_body_size 1M;
    }

    # ── React SPA fallback (all non-API routes → index.html) ─────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Block sensitive files ────────────────────────────────────────────────
    location ~ /\.(env|git|gitignore) {
        deny all;
        return 404;
    }

    # ── Logs ─────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/tfc-access.log;
    error_log  /var/log/nginx/tfc-error.log;
}
