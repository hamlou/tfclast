<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TFC – The Total Full Contact Championship</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,700;0,900;1,900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --red: #e01818;
  --red-glow: rgba(224,24,24,0.35);
  --red-dim: #9b1111;
  --bg: #0e0e0f;
  --surface: rgba(255,255,255,0.04);
  --surface-hover: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.08);
  --border-focus: rgba(224,24,24,0.6);
  --text: #f0f0f0;
  --muted: #6b6b70;
  --input-bg: rgba(255,255,255,0.055);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  overflow: hidden;
}

/* ANIMATED BACKGROUND */
.bg {
  position: fixed; inset: 0; z-index: 0;
  background: #0e0e0f;
  overflow: hidden;
}
.bg::before {
  content: '';
  position: absolute;
  top: -30%; left: 50%;
  transform: translateX(-50%);
  width: 800px; height: 800px;
  background: radial-gradient(circle, rgba(180,10,10,0.18) 0%, transparent 65%);
  animation: pulseA 6s ease-in-out infinite;
}
.bg::after {
  content: '';
  position: absolute;
  bottom: -20%; right: -10%;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(224,24,24,0.08) 0%, transparent 70%);
  animation: pulseA 8s ease-in-out infinite reverse;
}
@keyframes pulseA {
  0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
  50%       { opacity: 1;   transform: translateX(-50%) scale(1.12); }
}

.grid-overlay {
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 50px 50px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
}

.wrapper {
  position: relative; z-index: 1;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow-y: auto;
}

/* CARD */
.card {
  width: 100%;
  max-width: 430px;
  background: rgba(16,16,18,0.88);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 44px 40px 40px;
  backdrop-filter: blur(24px);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.04),
    0 32px 80px rgba(0,0,0,0.6),
    0 0 80px rgba(180,10,10,0.08);
  animation: slideUp 0.55s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* LOGO */
.logo-wrap { text-align: center; margin-bottom: 6px; }
.logo-tfc {
  font-family: 'Barlow Condensed', sans-serif;
  font-style: italic;
  font-weight: 900;
  font-size: 88px;
  line-height: 0.9;
  letter-spacing: -2px;
  background: linear-gradient(160deg, #ff3a3a 0%, #c00 60%, #7a0000 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 28px rgba(224,24,24,0.55));
}
.tagline {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 5px;
  color: var(--muted);
  text-align: center;
  margin-bottom: 34px;
  text-transform: uppercase;
}

/* TABS */
.tabs {
  display: flex;
  background: rgba(255,255,255,0.04);
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 28px;
  position: relative;
}
.tab-indicator {
  position: absolute;
  top: 4px; bottom: 4px; left: 4px;
  width: calc(50% - 4px);
  background: var(--red);
  border-radius: 9px;
  transition: transform 0.32s cubic-bezier(0.34,1.36,0.64,1);
  box-shadow: 0 2px 20px rgba(224,24,24,0.45);
}
.tab-indicator.right { transform: translateX(calc(100% + 8px)); }
.tab {
  flex: 1; text-align: center;
  padding: 10px;
  font-size: 12px; font-weight: 600; letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  position: relative; z-index: 1;
  transition: color 0.25s;
  user-select: none;
}
.tab.active { color: #fff; }

/* FORMS */
.form { display: none; flex-direction: column; gap: 12px; }
.form.active { display: flex; animation: fadeUp 0.28s ease both; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* FIELD */
.field { position: relative; }
.field-inner {
  display: flex;
  align-items: stretch;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
}
.field-inner:focus-within {
  border-color: var(--border-focus);
  background: rgba(255,255,255,0.07);
  box-shadow: 0 0 0 3px rgba(224,24,24,0.12);
}
.field-content {
  flex: 1;
  position: relative;
  padding: 0 16px;
}
.field-label {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  color: var(--muted);
  pointer-events: none;
  transition: top 0.2s, transform 0.2s, font-size 0.2s, color 0.2s;
  white-space: nowrap;
}
.field-content input:focus ~ .field-label,
.field-content input:not(:placeholder-shown) ~ .field-label {
  top: 10px;
  transform: none;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: var(--red);
}
.field-content input {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: var(--text);
  padding: 22px 0 8px;
  caret-color: var(--red);
}
.field-content input::placeholder { color: transparent; }

.eye-btn {
  width: 48px;
  display: flex; align-items: center; justify-content: center;
  background: transparent;
  border: none;
  border-left: 1px solid var(--border);
  cursor: pointer;
  color: var(--muted);
  transition: color 0.2s, background 0.2s;
  flex-shrink: 0;
}
.eye-btn:hover { color: var(--text); background: rgba(255,255,255,0.04); }
.eye-btn svg { width: 16px; height: 16px; display: block; }

/* STRENGTH BAR */
.strength-bar {
  height: 3px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  overflow: hidden;
  margin-top: -4px;
}
.strength-fill {
  height: 100%;
  border-radius: 2px;
  width: 0%;
  transition: width 0.4s ease, background 0.4s ease, box-shadow 0.4s;
}

/* PASSWORD RULES */
.pw-rules {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px 16px;
}
.pw-rule {
  display: flex; align-items: center; gap: 8px;
  font-size: 11.5px; font-weight: 500;
  color: #4a4a52;
  transition: color 0.3s;
}
.pw-rule .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #333; flex-shrink: 0;
  transition: background 0.3s, box-shadow 0.3s;
}
.pw-rule.pass { color: #55d080; }
.pw-rule.pass .dot { background: #55d080; box-shadow: 0 0 6px rgba(85,208,128,0.6); }
.pw-rule.fail { color: #e01818; }
.pw-rule.fail .dot { background: #e01818; box-shadow: 0 0 6px rgba(224,24,24,0.5); }

/* OPTIONS ROW */
.row-options {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 0 2px;
}
.remember {
  display: flex; align-items: center; gap: 9px;
  font-size: 13px; color: var(--muted);
  cursor: pointer; user-select: none;
  transition: color 0.2s;
}
.remember:hover { color: var(--text); }
.remember input[type="checkbox"] {
  appearance: none;
  width: 18px; height: 18px;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 5px;
  cursor: pointer;
  position: relative;
  flex-shrink: 0;
  transition: all 0.2s;
}
.remember input[type="checkbox"]:checked {
  background: var(--red);
  border-color: var(--red);
  box-shadow: 0 0 10px rgba(224,24,24,0.4);
}
.remember input[type="checkbox"]:checked::after {
  content: '';
  position: absolute;
  top: 3px; left: 6px;
  width: 4px; height: 8px;
  border: 2px solid #fff;
  border-left: none; border-top: none;
  transform: rotate(45deg);
}
.forgot {
  font-size: 12px; font-weight: 600;
  color: var(--red); text-decoration: none;
  letter-spacing: 0.3px;
  transition: opacity 0.2s;
}
.forgot:hover { opacity: 0.7; }

/* PRIMARY BUTTON */
.btn-primary {
  position: relative; width: 100%; padding: 16px;
  background: var(--red); border: none; border-radius: 12px;
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 600;
  letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer; overflow: hidden;
  transition: transform 0.15s, box-shadow 0.3s;
  box-shadow: 0 4px 24px rgba(224,24,24,0.4);
  margin-top: 4px;
}
.btn-primary::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, transparent 50%);
  opacity: 0; transition: opacity 0.2s;
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 32px rgba(224,24,24,0.55); }
.btn-primary:hover::before { opacity: 1; }
.btn-primary:active { transform: scale(0.99); }

/* SWITCH TEXT */
.switch-text { text-align: center; font-size: 13px; color: var(--muted); }
.switch-text span { color: var(--red); font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
.switch-text span:hover { opacity: 0.7; }

/* DIVIDER */
.divider { display: flex; align-items: center; gap: 14px; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.divider span { font-size: 11px; font-weight: 500; color: var(--muted); letter-spacing: 0.5px; white-space: nowrap; }

/* GOOGLE BUTTON */
.btn-google {
  width: 100%; padding: 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 500;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: background 0.2s, border-color 0.2s, transform 0.15s;
}
.btn-google:hover { background: var(--surface-hover); border-color: rgba(255,255,255,0.15); transform: translateY(-1px); }
.btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }
</style>
</head>
<body>

<div class="bg"></div>
<div class="grid-overlay"></div>

<div class="wrapper">
  <div class="card">

    <div class="logo-wrap">
      <div class="logo-tfc">TFC</div>
    </div>
    <div class="tagline">The Total Full Contact Championship</div>

    <div class="tabs">
      <div class="tab-indicator" id="tab-indicator"></div>
      <div class="tab" id="tab-login" onclick="switchTab('login')">Sign In</div>
      <div class="tab active" id="tab-signup" onclick="switchTab('signup')">Sign Up</div>
    </div>

    <!-- LOGIN -->
    <form class="form" id="form-login" onsubmit="return false;">
      <div class="field">
        <div class="field-inner">
          <div class="field-content">
            <input type="email" id="login-email" placeholder=" " autocomplete="email">
            <span class="field-label">Email address</span>
          </div>
        </div>
      </div>

      <div class="field">
        <div class="field-inner">
          <div class="field-content">
            <input type="password" id="login-password" placeholder=" " autocomplete="current-password">
            <span class="field-label">Password</span>
          </div>
          <button type="button" class="eye-btn" onclick="togglePw('login-password')" aria-label="Toggle">
            <svg id="eye-login-password" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="row-options">
        <label class="remember">
          <input type="checkbox"> Remember me
        </label>
        <a class="forgot" href="#">Forgot password?</a>
      </div>

      <button type="submit" class="btn-primary">Sign In</button>
      <div class="switch-text">First time here? <span onclick="switchTab('signup')">Create account</span></div>
      <div class="divider"><span>or continue with</span></div>
      <button type="button" class="btn-google">
        <svg viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.29-8.16 2.29-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Continue with Google
      </button>
    </form>

    <!-- SIGN UP -->
    <form class="form active" id="form-signup" onsubmit="return false;">
      <div class="field">
        <div class="field-inner">
          <div class="field-content">
            <input type="text" id="signup-username" placeholder=" " autocomplete="username">
            <span class="field-label">Username</span>
          </div>
        </div>
      </div>

      <div class="field">
        <div class="field-inner">
          <div class="field-content">
            <input type="email" id="signup-email" placeholder=" " autocomplete="email">
            <span class="field-label">Email address</span>
          </div>
        </div>
      </div>

      <div class="field">
        <div class="field-inner">
          <div class="field-content">
            <input type="password" id="signup-password" placeholder=" " autocomplete="new-password" oninput="checkPw(this.value)">
            <span class="field-label">Password</span>
          </div>
          <button type="button" class="eye-btn" onclick="togglePw('signup-password')" aria-label="Toggle">
            <svg id="eye-signup-password" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>

      <div class="pw-rules">
        <div class="pw-rule" id="rule-len"><span class="dot"></span>8+ characters</div>
        <div class="pw-rule" id="rule-upper"><span class="dot"></span>Uppercase letter</div>
        <div class="pw-rule" id="rule-num"><span class="dot"></span>Number</div>
        <div class="pw-rule" id="rule-special"><span class="dot"></span>Special character</div>
      </div>

      <div class="field">
        <div class="field-inner">
          <div class="field-content">
            <input type="password" id="signup-confirm" placeholder=" " autocomplete="new-password">
            <span class="field-label">Confirm password</span>
          </div>
        </div>
      </div>

      <button type="submit" class="btn-primary">Create Account</button>
      <div class="switch-text">Already a member? <span onclick="switchTab('login')">Sign in</span></div>
    </form>

  </div>
</div>

<script>
let current = 'signup';

function switchTab(tab) {
  if (tab === current) return;
  current = tab;
  const ind = document.getElementById('tab-indicator');
  ['login','signup'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t === tab);
    document.getElementById('form-'+t).classList.toggle('active', t === tab);
  });
  ind.classList.toggle('right', tab === 'signup');
}

const eyeOpen   = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
const eyeClosed = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;

function togglePw(id) {
  const inp = document.getElementById(id);
  const svg = document.getElementById('eye-' + id);
  const isText = inp.type === 'text';
  inp.type = isText ? 'password' : 'text';
  if (svg) svg.innerHTML = isText ? eyeOpen : eyeClosed;
}

function checkPw(val) {
  const tests = [
    { id: 'rule-len',     ok: val.length >= 8 },
    { id: 'rule-upper',  ok: /[A-Z]/.test(val) },
    { id: 'rule-num',    ok: /[0-9]/.test(val) },
    { id: 'rule-special', ok: /[^A-Za-z0-9]/.test(val) },
  ];
  let score = 0;
  tests.forEach(r => {
    const el = document.getElementById(r.id);
    el.classList.toggle('pass', r.ok);
    el.classList.toggle('fail', val.length > 0 && !r.ok);
    if (r.ok) score++;
  });
  const fill = document.getElementById('strength-fill');
  const colors = ['', '#e01818', '#e07018', '#d4b800', '#55d080'];
  fill.style.width = score / 4 * 100 + '%';
  fill.style.background = colors[score] || 'transparent';
  fill.style.boxShadow = score === 4 ? '0 0 8px rgba(85,208,128,0.5)' : 'none';
}

// Init
document.getElementById('tab-indicator').classList.add('right');
</script>
</body>
</html>
